name: Deploy to GitHub Pages

on:
  # Jalan otomatis tiap push ke branch main
  push:
    branches: [main]
  # Bisa juga dijalankan manual dari tab "Actions"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Biar deploy tidak tabrakan kalau ada push beruntun
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3   # otomatis: install deps + astro build + upload artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
